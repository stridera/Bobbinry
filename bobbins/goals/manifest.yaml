id: goals
name: Goals & Progress
version: 1.0.5
author: "Bobbins Core"
description: "Word count goals, writing sessions, streaks, and progress visualization"
tags: [goals, progress, writing, tracking]
license: MIT
category: write

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: true
data:
  collections:
    - name: goals
      fields:
        - { name: name, type: text, required: true }
        - { name: type, type: text }
        - { name: target_count, type: number, required: true }
        - { name: current_count, type: number }
        - { name: start_date, type: datetime }
        - { name: end_date, type: datetime }
        - { name: status, type: text }
    - name: writing_sessions
      fields:
        - { name: start_time, type: datetime, required: true }
        - { name: end_time, type: datetime }
        - { name: word_count, type: number, required: true }
        - { name: notes, type: text }
        - { name: goal_id, type: text }
    - name: streaks
      fields:
        - { name: current_streak, type: number }
        - { name: longest_streak, type: number }
        - { name: last_writing_date, type: datetime }

ui:
  views:
    - id: dashboard
      name: Goals Dashboard
      type: custom
      source: "*"
      handlers:
        - "*"
    - id: goal-editor
      name: Goal Editor
      type: custom
      source: "*"
      handlers:
        - "goals"
      requiresEntity: true

interactions:
  actions:
    - id: create_goal
      name: Create Goal
      type: create
      target: goals
    - id: log_session
      name: Log Writing Session
      type: create
      target: writing_sessions

extensions:
  contributions:
    # Rail launcher: no entry/panel — clicking the icon opens the goals
    # dashboard in the main view (left bar = project navigation)
    - slot: shell.leftPanel
      type: panel
      id: goals-launcher
      icon: target
      home:
        entityType: goals
        entityId: dashboard
        metadata: { view: dashboard }
      title: "Goals"
    # Contextual progress while writing (right bar = information)
    - slot: shell.rightPanel
      type: panel
      id: progress
      title: "Progress"
      entry: panels/progress

external: null

linking:
  entities: []

publish: null

compatibility:
  minShellVersion: 1.0.0
  migrations: []
