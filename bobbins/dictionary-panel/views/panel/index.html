<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dictionary Panel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tabs">
      <button class="tab active" data-tab="dictionary">Definition</button>
      <button class="tab" data-tab="thesaurus">Thesaurus</button>
    </div>

    <main>
      <div id="status">
        <svg class="status-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <span class="status-text">Select a word in the editor to look it up</span>
      </div>

      <div id="entry"></div>
      <div id="thesaurus"></div>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
