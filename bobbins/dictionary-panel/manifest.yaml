id: dictionary-panel
name: Dictionary Panel
version: 1.2.0
author: "Bobbins Samples"
description: "Right-side panel with dictionary definitions and thesaurus. Looks up selected words via Free Dictionary API and Datamuse."
tags: [panel, dictionary, thesaurus, pubsub]
license: MIT
capabilities: { publishable: false, external: true, ai: false, customViews: false }
compatibility:
  minShellVersion: "0.1.0"
extensions:
  contributions:
    - slot: shell.rightPanel
      type: panel
      id: dictionary-panel
      title: "Dictionary"
      entry: panels/dictionary-panel
      priority: 4
      when:
        inView: project
data:
  collections: []
external:
  endpoints:
    - id: dictionary
      url: https://api.dictionaryapi.dev/api/v2/entries/en/example
      method: GET
      description: Look up dictionary definitions for the selected word
    - id: synonyms
      url: https://api.datamuse.com/words
      method: GET
      description: Retrieve synonyms and antonyms for the selected word
  permissions:
    - endpoint: api.dictionaryapi.dev/api/v2/entries
      reason: Fetch dictionary definitions for the selected word
      required: true
    - endpoint: api.datamuse.com/words
      reason: Fetch related words for thesaurus suggestions
      required: true
