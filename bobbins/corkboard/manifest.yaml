id: corkboard
name: Corkboard
version: 1.0.0
author: Bobbinry Team
description: Visual board interface for organizing and reordering content cards
tags:
  - organization
  - visual
  - kanban
  - ui-only
license: Apache-2.0

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: true

execution:
  mode: native
  signature: dev_mode_skip

# Corkboard is UI-only - no data collections
# It provides alternative views for existing collections from other bobbins

ui:
  views:
    - id: board
      type: board
      name: Board
      source: views/board
      handlers:
        - container
      priority: 5
      layout:
        sort:
          - field: order
            direction: asc
      actions:
        - drag_reorder
        - edit_card
        - view_details

interactions:
  actions:
    - id: drag_reorder
      name: Drag to Reorder
      type: update
      parameters:
        - name: item_id
          type: text
          required: true
        - name: new_order
          type: number
          required: true
        - name: collection
          type: text
          required: true

    - id: edit_card
      name: Edit Card
      type: update
      parameters:
        - name: id
          type: text
          required: true
        - name: title
          type: text
          required: false
        - name: status
          type: text
          required: false

    - id: view_details
      name: View Details
      type: custom
      parameters:
        - name: id
          type: text
          required: true
        - name: collection
          type: text
          required: true

compatibility:
  minShellVersion: "0.1.0"
