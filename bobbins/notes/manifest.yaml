id: notes
name: Notes & Research
version: 1.0.0
author: "Bobbins Core"
description: "Rich research tool with folders, tagging, entity linking, and pinboard"
tags: [notes, research, organization, writing]
license: MIT

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: true
data:
  collections:
    - name: folders
      fields:
        - { name: name, type: text, required: true }
        - { name: parent_folder, type: text }
        - { name: order, type: number }
        - { name: color, type: text }
        - { name: icon, type: text }
    - name: notes
      fields:
        - { name: title, type: text, required: true }
        - { name: content, type: rich_text }
        - { name: folder_id, type: text }
        - { name: tags, type: json }
        - { name: linked_entities, type: json }
        - { name: pinned, type: boolean }
        - { name: color, type: text }
        - { name: icon, type: text }
        - { name: created_at, type: datetime }
        - { name: updated_at, type: datetime }

ui:
  views:
    - id: note-editor
      name: Note Editor
      type: custom
      source: "*"
      handlers:
        - "*"
    - id: pinboard
      name: Pinboard
      type: custom
      source: "*"
      handlers:
        - "*"

interactions:
  actions:
    - id: create_folder
      name: Create Folder
      type: create
      target: folders
    - id: create_note
      name: Create Note
      type: create
      target: notes

extensions:
  contributions:
    - slot: shell.leftPanel
      type: panel
      id: notes-navigation
      title: "Notes"
      entry: panels/navigation

external: null

linking:
  entities: []

publish: null

compatibility:
  minShellVersion: 1.0.0
  migrations: []
