id: timeline
name: Timeline
version: 1.0.0
author: "Bobbins Core"
description: "Chronological event tracking for plot and world history"
tags: [timeline, chronology, worldbuilding, planning]
license: MIT

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: true
data:
  collections:
    - name: timelines
      fields:
        - { name: name, type: text, required: true }
        - { name: description, type: text }
        - { name: scale, type: text }
        - { name: color, type: text }
    - name: timeline_events
      fields:
        - { name: title, type: text, required: true }
        - { name: description, type: text }
        - { name: date_label, type: text, required: true }
        - { name: sort_order, type: number, required: true }
        - { name: timeline_id, type: text, required: true }
        - { name: linked_entities, type: json }
        - { name: tags, type: json }
        - { name: color, type: text }
        - { name: icon, type: text }
        - { name: duration_label, type: text }

ui:
  views:
    - id: timeline
      name: Timeline
      type: custom
      source: "*"
      handlers:
        - "*"
    - id: event-editor
      name: Event Editor
      type: custom
      source: "*"
      handlers:
        - "*"

interactions:
  actions:
    - id: create_timeline
      name: Create Timeline
      type: create
      target: timelines
    - id: create_event
      name: Create Event
      type: create
      target: timeline_events

extensions:
  contributions:
    - slot: shell.leftPanel
      type: panel
      id: timeline-navigation
      title: "Timeline"
      entry: panels/navigation

external: null

linking:
  entities: []

publish: null

compatibility:
  minShellVersion: 1.0.0
  migrations: []
