id: bookworm-siege
name: Bookworm Siege
version: 1.0.0
author: Bobbinry Team
description: A typing tower-defense game — every word you type fires a tower at the bookworms besieging your castle. Set a word goal, a target WPM, and secret words for burst attacks.
tags:
  - writing
  - fun
  - game
license: Apache-2.0
category: fun

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: false

extensions:
  contributions:
    - slot: shell.rightPanel
      type: panel
      id: bookworm-siege-panel
      title: "Bookworm Siege"
      entry: panels/game-panel
      priority: 6
      when:
        entityType: content

compatibility:
  minShellVersion: "0.1.0"

data:
  collections: []
