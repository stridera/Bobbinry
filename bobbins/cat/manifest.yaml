id: cat
name: Cat Companion
version: 1.0.2
author: Bobbinry Team
description: A morale-boosting writing companion that rewards you with cat images every 1,000 words and plays meow sounds when you type "cat" or "meow"
tags:
  - writing
  - fun
  - companion
license: Apache-2.0

capabilities:
  publishable: false
  external: true
  ai: false
  customViews: false
extensions:
  contributions:
    - slot: shell.rightPanel
      type: panel
      id: cat-panel
      title: "Cat Companion"
      entry: panels/cat-panel
      priority: 5
      when:
        entityType: content

compatibility:
  minShellVersion: "0.1.0"

data:
  collections: []

external:
  endpoints:
    - id: cat-images
      url: https://api.thecatapi.com/v1/images/search
      method: GET
      description: Fetch reward cat images for writing milestones
  permissions:
    - endpoint: api.thecatapi.com/v1
      reason: Load celebratory cat images when the writer hits milestones
      required: true
