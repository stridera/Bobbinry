id: cat
name: Cat Companion
version: 1.0.0
author: Bobbinry Team
description: A morale-boosting writing companion that rewards you with cat images every 1,000 words and plays meow sounds when you type "cat" or "meow"
tags:
  - writing
  - fun
  - companion
license: Apache-2.0

capabilities:
  publishable: false
  external: false
  ai: false
  customViews: false

execution:
  mode: native
  signature: dev_mode_skip

extensions:
  contributions:
    - slot: shell.rightPanel
      type: panel
      id: cat-panel
      title: "Cat Companion"
      entry: panels/cat-panel
      priority: 5
      when:
        inView: project

compatibility:
  minShellVersion: "0.1.0"

data:
  collections: []
