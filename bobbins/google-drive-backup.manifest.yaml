id: google-drive-backup
name: Google Drive Backup
version: 1.0.1
author: Bobbins Core
description: Automatically back up all your projects to Google Drive
tags: [backup, integration, cloud-storage, automation]
license: MIT

capabilities:
  external: true
  backup: true
  customViews: true
extensions:
  contributions:
    - slot: shell.projectBackup
      type: panel
      id: drive-sync
      title: "Google Drive Backup"
      entry: panels/drive-sync
      priority: 6
external:
  endpoints:
    - id: drive_files_list
      url: https://www.googleapis.com/drive/v3/files
      method: GET
      description: List files in Google Drive
    - id: drive_files_create
      url: https://www.googleapis.com/drive/v3/files
      method: POST
      description: Create or upload files to Google Drive
    - id: drive_files_update
      url: https://www.googleapis.com/drive/v3/files/*
      method: PUT
      description: Update existing files in Google Drive
    - id: drive_files_upload
      url: https://www.googleapis.com/upload/drive/v3/files
      method: POST
      description: Upload file contents to Google Drive
    - id: oauth_token
      url: https://oauth2.googleapis.com/token
      method: POST
      description: Exchange authorization code for access token
  auth:
    type: oauth
    config:
      provider: google
      scopes:
        - https://www.googleapis.com/auth/drive.file
        - https://www.googleapis.com/auth/drive.appdata
  permissions:
    - endpoint: googleapis.com/drive
      reason: Sync chapters to Google Drive folders
      required: true
    - endpoint: oauth2.googleapis.com
      reason: Authenticate with Google OAuth
      required: true
