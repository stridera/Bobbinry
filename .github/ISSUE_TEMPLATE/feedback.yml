name: Feedback
description: Share general feedback, questions, or UX thoughts
title: "[Feedback] "
labels: ["feedback", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What area does your feedback relate to?
      options:
        - "Core: Shell"
        - "Core: API"
        - SDK/Packages
        - Bobbin
        - Documentation
        - CI/Infrastructure
        - General/Overall
        - Community/Contributing
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: Share your thoughts, questions, or suggestions.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any additional context that might be helpful.
    validations:
      required: false
