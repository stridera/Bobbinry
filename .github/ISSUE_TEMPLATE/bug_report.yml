name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - "Core: Shell"
        - "Core: API"
        - SDK/Packages
        - Bobbin
        - Documentation
        - CI/Infrastructure
    validations:
      required: true

  - type: dropdown
    id: bobbin
    attributes:
      label: Bobbin
      description: If this involves a specific bobbin, which one?
      options:
        - N/A
        - Manuscript
        - Corkboard
        - Entities
        - Timeline
        - Notes
        - AI Tools
        - Web Publisher
        - Relationships
        - Goals
        - Dictionary
        - Discord Notifier
        - Discord Roles
        - Google Drive Backup
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or paste error logs if available.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      placeholder: e.g. Chrome 120, Firefox 121, Safari 17
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Hosted (bobbinry.com)
        - Self-hosted
    validations:
      required: false
